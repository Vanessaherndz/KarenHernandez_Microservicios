version: '3.8'

services:
  productservice:
    build: ./ProductService
    ports:
      - "5001:8080"

  customerservice:
    build: ./CustomerService
    ports:
      - "5002:8080"

  orderservice:
    build: ./OrderService
    ports:
      - "5003:8080"

  gateway:
    build: ./Gateway
    ports:
      - "5000:8080"
    depends_on:
      - productservice
      - customerservice
      - orderservice
